name: Build Android APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install root dependencies
        run: npm install

      - name: Install React app dependencies
        working-directory: react-app
        run: npm ci || npm install

      - name: Copy web app and build
        run: npm run build

      - name: Add Android platform (if not present)
        working-directory: react-app
        run: npx cap add android || true

      - name: Sync Capacitor Android
        working-directory: react-app
        run: npx cap sync android

      - name: Set Android SDK versions and build version
        working-directory: react-app
        env:
          BUILD_VERSION: ${{ github.run_number }}
        run: node patch-android-sdk.js

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Make gradlew executable
        working-directory: react-app/android
        run: chmod +x gradlew || true

      - name: Build debug APK
        working-directory: react-app/android
        run: ./gradlew assembleDebug --no-daemon

      - name: Output APK to App build/Android (versioned + latest)
        run: |
          mkdir -p "App build/Android"
          cp react-app/android/app/build/outputs/apk/debug/app-debug.apk "App build/Android/app-debug.apk"
          cp react-app/android/app/build/outputs/apk/debug/app-debug.apk "App build/Android/app-debug-${{ github.run_number }}.apk"
          echo '{"version":${{ github.run_number }},"file":"app-debug-${{ github.run_number }}.apk"}' > "App build/Android/latest.json"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android
          path: "App build/Android/"

      - name: Commit and push Android build to repo (for download link)
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "App build/Android/"
          git diff --staged --quiet || git commit -m "Update Android APK (build ${{ github.run_number }}) [skip ci]"
          git push
