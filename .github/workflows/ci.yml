# =============================================================================
# Rianell - unified GitHub Actions (main CI)
# =============================================================================
# Security audits: `.github/workflows/security-audit.yml` (standalone).
# Legacy Capacitor Android/iOS: `.github/workflows/legacy-capacitor.yml` (disabled).
#
# Sections (jobs appear in dependency order):
#   1. paths-filter      - Push only: whether to run mobile build/release (skip if
#                          the only changed paths are under App build/, so bot
#                          commits do not rebuild APKs or duplicate releases).
#   2. unit-tests        - App unit checks (Node test runner) for core UI wiring.
#   3. expo-bundle-prod  - Expo React Native: production JS bundles for Android + iOS
#                          (`expo export` → Hermes .hbc per platform).
#   4. server-exe        - Build Windows server EXE artifacts (x64 + x86) with PyInstaller.
#   5. commit-app-build  - Push + mobile: commit App build/ to the branch.
#   6. publish-release   - Push + mobile: GitHub Release with Expo + Server assets.
#   7. deploy-pages      - Push to main/master: site from web/ + App build/.
#   8. readme-build-info - After deploy (web-only runs): README beta table + build numbers.
# =============================================================================

name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

# JavaScript actions (checkout, setup-node, etc.) use a bundled Node runtime; GitHub is
# moving that default to Node 24. Opt in so we avoid Node 20 deprecation warnings.
# https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ---------------------------------------------------------------------------
  # Path gate for mobile release on push (replaces paths-ignore on old workflow)
  # ---------------------------------------------------------------------------
  paths-filter:
    name: Path gate (mobile release on push)
    runs-on: ubuntu-latest
    outputs:
      mobile_release: ${{ steps.out.outputs.mobile_release }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - id: out
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "mobile_release=false" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mobile_release=false" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" = "push" ]; then
            BEFORE="${{ github.event.before }}"
            SHA="${{ github.sha }}"
            if [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
              echo "mobile_release=true" >> $GITHUB_OUTPUT
            else
              CHANGED=$(git diff --name-only "$BEFORE" "$SHA" 2>/dev/null || true)
              if [ -z "$CHANGED" ]; then
                echo "mobile_release=false" >> $GITHUB_OUTPUT
              elif echo "$CHANGED" | grep -qv '^App build/'; then
                echo "mobile_release=true" >> $GITHUB_OUTPUT
              else
                echo "mobile_release=false" >> $GITHUB_OUTPUT
              fi
            fi
          else
            echo "mobile_release=false" >> $GITHUB_OUTPUT
          fi

  # ---------------------------------------------------------------------------
  # Security audit (runs concurrently with unit-tests + minified-asset prep)
  # ---------------------------------------------------------------------------
  security-audit:
    name: Security audit
    needs: [paths-filter]
    if: |
      github.event_name == 'pull_request' ||
      github.event_name == 'push'
    uses: ./.github/workflows/security-audit.yml
    secrets: inherit

  # ---------------------------------------------------------------------------
  # Pre-minified web assets (temp artifacts used by all build flows)
  # ---------------------------------------------------------------------------
  prepare-minified-assets:
    name: Prepare minified temp assets
    needs: [paths-filter]
    if: |
      github.event_name == 'pull_request' ||
      github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Install React app dependencies
        working-directory: react-app
        run: npm ci

      - name: Build minified legacy bundle (temp)
        run: npm run build:web:apk

      - name: Build minified React shell (temp)
        run: npm run build:react

      - name: Prepare minified temp directories
        run: |
          rm -rf "ci-minified"
          mkdir -p "ci-minified"
          cp -r "web/.android-dist" "ci-minified/web-android-dist"
          cp -r "react-app/dist" "ci-minified/react-dist"

          mkdir -p "ci-minified/site"
          cp -r web/* "ci-minified/site/"
          if [ -d "App build" ]; then
            mkdir -p "ci-minified/site/App build"
            cp -r "App build/"* "ci-minified/site/App build/" 2>/dev/null || true
          fi
          node web/build-site.mjs --site "ci-minified/site"
          node -e "
          const fs = require('fs');
          let h = fs.readFileSync('ci-minified/site/index.html', 'utf8');
          h = h.replace(/app\\.js\\?v=(\\d+)/g, function (_, v) { return 'app.min.js?v=' + v; });
          fs.writeFileSync('ci-minified/site/index.html', h);
          "

          test -f "ci-minified/web-android-dist/app.min.js"
          test -f "ci-minified/react-dist/legacy/app.min.js"
          test -f "ci-minified/site/app.min.js"

      - name: Upload minified temp artifact
        uses: actions/upload-artifact@v5
        with:
          name: minified-prebuild
          path: ci-minified/

  # ---------------------------------------------------------------------------
  # Unit tests (app functionality wiring checks)
  # ---------------------------------------------------------------------------
  unit-tests:
    name: Unit tests
    needs: [paths-filter]
    if: |
      github.event_name == 'pull_request' ||
      github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
      - name: Install root dependencies
        run: npm ci
      - name: Run app unit tests
        run: npm run test:unit

  # ---------------------------------------------------------------------------
  # Expo production bundle (minified JS) gate
  # ---------------------------------------------------------------------------
  expo-bundle-prod:
    name: Expo prod bundle (minified)
    needs: [paths-filter, unit-tests, security-audit]
    if: |
      github.event_name == 'pull_request' ||
      github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm

      - name: Install root dependencies (workspaces)
        run: npm ci

      - name: Typecheck + test Expo app
        run: |
          npm run typecheck:mobile
          npm run test:mobile

      - name: Expo export — production bundles (Android + iOS)
        env:
          EXPO_NO_TELEMETRY: "1"
          NODE_ENV: production
        run: |
          npm run bundle:mobile:prod
          test -d "apps/mobile/dist-expo-prod"
      - name: Verify Android Hermes bundle (.hbc)
        run: test -f apps/mobile/dist-expo-prod/_expo/static/js/android/*.hbc
      - name: Verify iOS Hermes bundle (.hbc)
        run: test -f apps/mobile/dist-expo-prod/_expo/static/js/ios/*.hbc

      - name: Upload Expo bundle artifact
        uses: actions/upload-artifact@v5
        with:
          name: expo-bundles
          path: apps/mobile/dist-expo-prod/

  # ---------------------------------------------------------------------------
  # React Native CLI native artifacts (no EAS / no EXPO_TOKEN)
  # ---------------------------------------------------------------------------
  rncli-android-apk:
    name: Android APK (React Native CLI)
    needs: [paths-filter, expo-bundle-prod]
    if: |
      github.event_name == 'push' &&
      needs.paths-filter.outputs.mobile_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install root dependencies (workspaces)
        run: npm ci

      - name: Generate native project (expo prebuild -> RN CLI)
        working-directory: apps/mobile
        env:
          EXPO_NO_TELEMETRY: "1"
        run: npx expo prebuild --platform android --non-interactive --no-install

      - name: Assemble Android debug APK
        working-directory: apps/mobile/android
        run: ./gradlew assembleDebug --no-daemon

      - name: Collect APK + latest.json
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p rncli-android-dist
          shopt -s nullglob
          apks=(app/build/outputs/apk/debug/*.apk)
          if [ ${#apks[@]} -eq 0 ]; then
            echo "No APKs found under app/build/outputs/apk/debug"
            exit 1
          fi
          cp -v "${apks[0]}" rncli-android-dist/app-debug-beta.apk
          echo "{\"version\":${GITHUB_RUN_NUMBER},\"file\":\"app-debug-beta.apk\"}" > rncli-android-dist/latest.json

      - name: Upload Android dist
        uses: actions/upload-artifact@v5
        with:
          name: rncli-android-dist
          path: rncli-android-dist/

  rncli-ios-zip:
    name: iOS emulator Xcode project zip (React Native CLI)
    needs: [paths-filter, expo-bundle-prod]
    if: |
      github.event_name == 'push' &&
      needs.paths-filter.outputs.mobile_release == 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm

      - name: Install root dependencies (workspaces)
        run: npm ci

      - name: Generate native project (expo prebuild -> RN CLI)
        working-directory: apps/mobile
        env:
          EXPO_NO_TELEMETRY: "1"
        run: npx expo prebuild --platform ios --non-interactive --no-install

      - name: Zip iOS project for emulator usage
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p rncli-ios-dist
          run="${GITHUB_RUN_NUMBER}"
          zip -r "rncli-ios-dist/Health-Tracker-ios-alpha-build-${run}.zip" "apps/mobile/ios"
          cp -f "rncli-ios-dist/Health-Tracker-ios-alpha-build-${run}.zip" "rncli-ios-dist/Health-Tracker-ios-alpha-latest.zip"
          cp -f "rncli-ios-dist/Health-Tracker-ios-alpha-build-${run}.zip" "rncli-ios-dist/Health-Tracker-simulator-alpha-${run}.zip"
          echo "{\"version\":${run},\"file\":\"Health-Tracker-ios-alpha-build-${run}.zip\",\"simulatorFile\":\"Health-Tracker-simulator-alpha-${run}.zip\"}" > rncli-ios-dist/latest.json

      - name: Upload iOS dist
        uses: actions/upload-artifact@v5
        with:
          name: rncli-ios-dist
          path: rncli-ios-dist/

  # ---------------------------------------------------------------------------
  # Server Windows EXE (PyInstaller, x64 + x86)
  # ---------------------------------------------------------------------------
  server-exe:
    name: Server EXE (${{ matrix.arch }})
    needs: [paths-filter, prepare-minified-assets, unit-tests, security-audit]
    if: |
      github.event_name == 'pull_request' ||
      (github.event_name == 'push' && needs.paths-filter.outputs.mobile_release == 'true')
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [x64, x86]
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          architecture: ${{ matrix.arch }}

      - name: Install server dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pyinstaller
          python -m pip install pyarmor

      - name: Install UPX (best-effort)
        shell: pwsh
        run: |
          try {
            choco install upx -y --no-progress
          } catch {
            Write-Host "UPX install failed; continuing without UPX compression."
          }

      - name: Build server EXE
        shell: pwsh
        run: |
          $entryScript = "server/main.py"
          try {
            # Best-effort obfuscation: keep CI resilient if obfuscation fails.
            python -m pyarmor gen -r -O ".ci-obf" server
            if (Test-Path ".ci-obf/server/main.py") {
              $entryScript = ".ci-obf/server/main.py"
              Write-Host "Using obfuscated entry script: $entryScript"
            } else {
              Write-Host "Obfuscated entry not found; using source entry script."
            }
          } catch {
            Write-Host "PyArmor obfuscation failed; falling back to source entry script."
          }

          $upxPath = (Get-Command upx -ErrorAction SilentlyContinue).Source
          $pyArgs = @(
            "--noconfirm",
            "--clean",
            "--onefile",
            "--optimize", "2",
            "--name", "rianell-server-${{ matrix.arch }}"
          )
          if ($upxPath) {
            $pyArgs += @("--upx-dir", (Split-Path -Parent $upxPath))
            Write-Host "Using UPX from: $upxPath"
          } else {
            Write-Host "UPX not found; building without UPX compression."
          }
          python -m PyInstaller @pyArgs $entryScript
          New-Item -ItemType Directory -Force -Path "App build/Server" | Out-Null
          Copy-Item "dist/rianell-server-${{ matrix.arch }}.exe" "App build/Server/rianell-server-${{ matrix.arch }}.exe" -Force
          Set-Content -Path "App build/Server/latest-${{ matrix.arch }}.json" -Value "{""version"":${{ github.run_number }},""file"":""rianell-server-${{ matrix.arch }}.exe""}"
          if ("${{ matrix.arch }}" -eq "x64") {
            Copy-Item "App build/Server/latest-${{ matrix.arch }}.json" "App build/Server/latest.json" -Force
          }

      - name: Upload server EXE artifact
        uses: actions/upload-artifact@v5
        with:
          name: server-exe-${{ matrix.arch }}
          path: App build/Server/

      - name: Artifact note (PR)
        if: github.event_name == 'pull_request'
        shell: pwsh
        run: |
          Write-Host "Server artifact is available as 'server-exe-${{ matrix.arch }}' on this run."

  # ---------------------------------------------------------------------------
  # Commit App build/ after successful mobile build (push + mobile only)
  # ---------------------------------------------------------------------------
  commit-app-build:
    name: Commit App build to repo
    needs: [paths-filter, expo-bundle-prod, server-exe, rncli-android-apk, rncli-ios-zip]
    if: |
      github.event_name == 'push' &&
      needs.paths-filter.outputs.mobile_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Sync branch with origin
        run: |
          git fetch origin "${{ github.ref_name }}"
          git checkout -B "${{ github.ref_name }}" "origin/${{ github.ref_name }}"

      - name: Clear App build dirs before artifacts (avoid stale checked-in files)
        run: |
          rm -rf "App build/Expo" "App build/Server" "App build/RNCLI-Android" "App build/iOS"
          mkdir -p "App build/Expo" "App build/Server" "App build/RNCLI-Android" "App build/iOS"

      - name: Download Expo bundles artifact
        uses: actions/download-artifact@v5
        with:
          name: expo-bundles
          path: App build/Expo/dist-expo-prod

      - name: Download RN CLI Android APK
        uses: actions/download-artifact@v5
        with:
          name: rncli-android-dist
          path: App build/RNCLI-Android/

      - name: Download RN CLI iOS Xcode project zip
        uses: actions/download-artifact@v5
        with:
          name: rncli-ios-dist
          path: App build/iOS/

      - name: Download Server EXE artifacts
        uses: actions/download-artifact@v5
        with:
          pattern: server-exe-*
          path: gh-server

      - name: Merge Server EXE artifacts
        run: |
          cp -f gh-server/server-exe-x64/rianell-server-x64.exe "App build/Server/" || true
          cp -f gh-server/server-exe-x86/rianell-server-x86.exe "App build/Server/" || true
          cp -f gh-server/server-exe-x64/latest-x64.json "App build/Server/" || true
          cp -f gh-server/server-exe-x86/latest-x86.json "App build/Server/" || true
          if [ -f gh-server/server-exe-x64/latest.json ]; then
            cp -f gh-server/server-exe-x64/latest.json "App build/Server/latest.json"
          else
            echo '{"version":${{ github.run_number }},"file":"rianell-server-x64.exe"}' > "App build/Server/latest.json"
          fi

      - name: Setup Node (README build-info script)
        uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Write README beta build info
        env:
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node scripts/update-readme-build-info.mjs

      - name: Commit and push App build
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md "App build/Expo/" "App build/Server/" "App build/RNCLI-Android/" "App build/iOS/"
          git diff --staged --quiet || git commit -m "Update App build artifacts (build ${{ github.run_number }}) [skip ci]"
          git fetch origin "${{ github.ref_name }}"
          git push origin ${{ github.ref_name }}

  # ---------------------------------------------------------------------------
  # GitHub Release with Android + iOS binaries (push + mobile only)
  # ---------------------------------------------------------------------------
  publish-release:
    name: Publish GitHub Release
    needs: [paths-filter, expo-bundle-prod, server-exe, rncli-android-apk, rncli-ios-zip]
    if: |
      github.event_name == 'push' &&
      needs.paths-filter.outputs.mobile_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout (parity metadata)
        uses: actions/checkout@v5

      - name: Download Expo bundles artifact
        uses: actions/download-artifact@v5
        with:
          name: expo-bundles
          path: gh-release/Expo/dist-expo-prod

      - name: Download RN CLI Android APK artifact
        uses: actions/download-artifact@v5
        with:
          name: rncli-android-dist
          path: gh-release/RNCLI-Android/

      - name: Download RN CLI iOS emulator zip artifact
        uses: actions/download-artifact@v5
        with:
          name: rncli-ios-dist
          path: gh-release/RNCLI-iOS/

      - name: Download Server EXE binaries
        uses: actions/download-artifact@v5
        with:
          pattern: server-exe-*
          path: gh-release/Server

      - name: Prepare release assets (this run only)
        run: |
          set -e
          RUN="${{ github.run_number }}"
          mkdir -p release-assets/Expo release-assets/RNCLI/Android release-assets/RNCLI/iOS release-assets/Legacy release-assets/Server release-assets/Meta

          # Expo bundles (minified production JS for iOS + Android)
          cd gh-release/Expo
          zip -r "../../release-assets/Expo/rianell-expo-bundles-${RUN}.zip" "dist-expo-prod"
          cd ../..

          # React Native CLI native artifacts (APK + iOS emulator zip)
          if [ -d "gh-release/RNCLI-Android" ]; then
            cp -v "gh-release/RNCLI-Android/"* "release-assets/RNCLI/Android/" || true
          fi
          if [ -d "gh-release/RNCLI-iOS" ]; then
            cp -v "gh-release/RNCLI-iOS/"* "release-assets/RNCLI/iOS/" || true
          fi

          # Legacy (Capacitor) artifacts are not rebuilt; include the latest checked-in ones if present.
          if [ -d "App build/Android" ]; then cp -r "App build/Android" "release-assets/Legacy/Android" || true; fi
          if [ -d "App build/iOS" ]; then cp -r "App build/iOS" "release-assets/Legacy/iOS" || true; fi

          cp "gh-release/Server/server-exe-x64/rianell-server-x64.exe" "release-assets/Server/"
          cp "gh-release/Server/server-exe-x86/rianell-server-x86.exe" "release-assets/Server/"
          cp "gh-release/Server/server-exe-x64/latest-x64.json" "release-assets/Server/" || true
          cp "gh-release/Server/server-exe-x86/latest-x86.json" "release-assets/Server/" || true
          if [ -f "gh-release/Server/server-exe-x64/latest.json" ]; then
            cp "gh-release/Server/server-exe-x64/latest.json" "release-assets/Server/server-latest.json"
          fi
          cp "docs/platform-parity.json" "release-assets/Meta/platform-parity.json"
          echo "Release files:"
          find release-assets -type f | sort

      - name: Create GitHub Release with current build binaries
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: Rianell build ${{ github.run_number }}
          body: |
            ## Build info
            - Build: **${{ github.run_number }}**
            - Branch: `${{ github.ref_name }}`
            - Commit: `${{ github.sha }}`

            ## Assets

            ### Expo (React Native)
            Directory: `release-assets/Expo/`
            - `rianell-expo-bundles-${{ github.run_number }}.zip` (minified production JS bundles for iOS + Android)

            ### React Native CLI (native release artifacts)
            Directory: `release-assets/RNCLI/`
            - `Android/` (APK + metadata)
            - `iOS/` (iOS emulator Xcode project zip + metadata)

            ### Legacy (Capacitor)
            Directory: `release-assets/Legacy/`
            - `Android/` and `iOS/` directories (copied from checked-in `App build/` if present; legacy builds are no longer rebuilt in CI)

            ### Server (Windows EXE)
            Directory: `release-assets/Server/`
            - `rianell-server-x64.exe`
            - `rianell-server-x86.exe`
            - `server-latest.json`, `latest-x64.json`, `latest-x86.json` (metadata)

            ### Parity metadata
            Directory: `release-assets/Meta/`
            - `platform-parity.json` (machine-readable platform support matrix)

            ## Notes
            - This release is generated automatically by CI.
            - A workflow commit updates `App build/` on the branch so download links in the app/README stay current.
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
          files: |
            release-assets/Expo/*
            release-assets/RNCLI/**/*
            release-assets/Legacy/**/*
            release-assets/Server/*
            release-assets/Meta/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ---------------------------------------------------------------------------
  # GitHub Pages - web/ + App build/ (every push to main/master)
  # ---------------------------------------------------------------------------
  deploy-pages:
    name: Deploy to GitHub Pages
    if: github.event_name == 'push'
    needs: [prepare-minified-assets, unit-tests, security-audit]
    runs-on: ubuntu-latest
    environment: pages
    concurrency:
      group: pages
      cancel-in-progress: true
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Download minified temp artifact
        uses: actions/download-artifact@v5
        with:
          name: minified-prebuild
          path: ci-minified

      - name: Prepare site from minified temp artifact
        run: |
          rm -rf site
          cp -r "ci-minified/site" site
          test -f "site/app.min.js"

      - name: Inject Supabase config for GitHub Pages (from secrets)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          node -e "
          const fs = require('fs');
          const path = 'site/supabase-config.js';
          let c = fs.readFileSync(path, 'utf8');
          const url = process.env.SUPABASE_URL || '';
          const key = process.env.SUPABASE_ANON_KEY || '';
          // JSON.stringify so keys/URLs with quotes or backslashes cannot break the JS file (fixes SyntaxError on line ~19)
          c = c.replace(/url:\s*'https:\/\/YOUR_PROJECT_REF\.supabase\.co'/, 'url: ' + JSON.stringify(url || 'https://YOUR_PROJECT_REF.supabase.co'));
          c = c.replace(/anonKey:\s*'YOUR_SUPABASE_ANON_KEY'/, 'anonKey: ' + JSON.stringify(key || 'YOUR_SUPABASE_ANON_KEY'));
          fs.writeFileSync(path, c);
          "

      - name: Upload artifact (web app + App build as site root)
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ---------------------------------------------------------------------------
  # README beta table (push to main, web-only runs - mobile runs update README in commit-app-build)
  # ---------------------------------------------------------------------------
  readme-build-info:
    name: Update README beta build info
    needs: [deploy-pages, paths-filter]
    if: |
      success() &&
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') &&
      needs.paths-filter.outputs.mobile_release != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Sync branch with origin
        run: |
          git fetch origin "${{ github.ref_name }}"
          git checkout -B "${{ github.ref_name }}" "origin/${{ github.ref_name }}"

      - uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Write README beta build info
        env:
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node scripts/update-readme-build-info.mjs

      - name: Commit and push README
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --staged --quiet && { echo "No README changes"; exit 0; }
          git commit -m "docs(readme): update beta build info [skip ci]"
          git push origin "${{ github.ref_name }}"
