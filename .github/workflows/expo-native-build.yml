name: Expo native build

on:
  workflow_dispatch:
    inputs:
      profile:
        description: "EAS build profile"
        type: choice
        required: true
        default: production
        options:
          - development
          - preview
          - production

permissions:
  contents: read

jobs:
  eas-native-build:
    name: EAS native build (iOS + Android)
    if: false # Disabled: CI now generates native artifacts via RN CLI prebuild (no EXPO_TOKEN).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate EAS token
        run: |
          if [ -z "${{ secrets.EXPO_TOKEN }}" ]; then
            echo "Missing EXPO_TOKEN secret."
            echo "Add EXPO_TOKEN in repo secrets before running this workflow."
            exit 1
          fi

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Build Android (cloud)
        working-directory: apps/mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: eas build --platform android --profile ${{ inputs.profile }} --non-interactive

      - name: Build iOS (cloud)
        working-directory: apps/mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: eas build --platform ios --profile ${{ inputs.profile }} --non-interactive
