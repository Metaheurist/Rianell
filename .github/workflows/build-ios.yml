# Builds the iOS Xcode project and a simulator .app (no Apple account required).
# - Simulator build: installable in Xcode iOS Simulator for testing without any Apple account.
# - Project zip: for device testing, open in Xcode and sign with your Apple ID (free, 7-day install).
# Device signing for direct install (OTA) requires an Apple Developer Program account ($99/year).
name: Build iOS

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install root dependencies
        run: npm install

      - name: Install React app dependencies
        working-directory: react-app
        run: npm ci || npm install

      - name: Copy web app and build
        run: npm run build

      - name: Add iOS platform (if not present)
        working-directory: react-app
        run: |
          if [ ! -d ios ]; then
            npx cap add ios
          else
            echo "ios/ already present, skipping add"
          fi

      - name: Sync Capacitor iOS
        working-directory: react-app
        run: npx cap sync ios

      - name: Install CocoaPods dependencies
        working-directory: react-app/ios/App
        run: pod install || true

      - name: Build for iOS Simulator (no signing required)
        working-directory: react-app
        run: |
          WS="ios/App/App.xcworkspace"
          if [ ! -d "$WS" ]; then echo "Workspace not found, skipping simulator build"; exit 0; fi
          if ! xcodebuild -workspace "$WS" -scheme App -configuration Debug \
            -sdk iphonesimulator -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath build clean build CODE_SIGN_IDENTITY="-" CODE_SIGNING_REQUIRED=NO 2>&1 | tee /tmp/xc.log | tail -30; then
            echo "Simulator build failed (project zip will still be produced); last lines:"
            tail -15 /tmp/xc.log
            exit 0
          fi
          APP_PATH="build/Build/Products/Debug-iphonesimulator/App.app"
          if [ -d "$APP_PATH" ]; then
            mkdir -p "../App build/iOS"
            RUN="${{ github.run_number }}"
            SIM_ZIP="Health-Tracker-simulator-${RUN}.zip"
            cd build/Build/Products/Debug-iphonesimulator
            zip -r "../../../../../App build/iOS/${SIM_ZIP}" App.app
            cd "../../../../.."
            echo "Simulator build: App build/iOS/${SIM_ZIP}"
          fi

      - name: Create App build/iOS and zip iOS project
        run: |
          mkdir -p "App build/iOS"
          RUN="${{ github.run_number }}"
          ZIPNAME="Health-Tracker-ios-build-${RUN}.zip"
          cd react-app
          zip -r "../App build/iOS/${ZIPNAME}" ios -x "*.DS_Store" -x "*DerivedData*" -x "*.xcuserstate"
          cd ..
          cp "App build/iOS/${ZIPNAME}" "App build/iOS/Health-Tracker-ios-latest.zip"
          SIM_ZIP="Health-Tracker-simulator-${RUN}.zip"
          if [ -f "App build/iOS/${SIM_ZIP}" ]; then
            echo "{\"version\":${RUN},\"file\":\"${ZIPNAME}\",\"simulatorFile\":\"${SIM_ZIP}\"}" > "App build/iOS/latest.json"
          else
            echo "{\"version\":${RUN},\"file\":\"${ZIPNAME}\"}" > "App build/iOS/latest.json"
          fi

      - name: Generate OTA manifest and installUrl (when .ipa present)
        env:
          RUN: ${{ github.run_number }}
          BASE_URL: ${{ vars.BUILD_IOS_BASE_URL }}
        run: |
          set -e
          IOS_DIR="App build/iOS"
          BASE="${BASE_URL:-https://metaheurist.github.io/Health-app/}"
          BASE="${BASE%/}/"
          IPA_PATH=$(ls "$IOS_DIR"/*.ipa 2>/dev/null | head -n1) || true
          if [ -n "$IPA_PATH" ]; then
            IPA_FILE=$(basename "$IPA_PATH")
            IPA_URL="${BASE}App%20build/iOS/$(printf '%s' "$IPA_FILE" | sed 's/ /%20/g')"
            MANIFEST_URL="${BASE}App%20build/iOS/manifest.plist"
            cat > "$IOS_DIR/manifest.plist" << MANIFEST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>items</key>
            <array>
              <dict>
                <key>assets</key>
                <array>
                  <dict>
                    <key>kind</key>
                    <string>software-package</string>
                    <key>url</key>
                    <string>${IPA_URL}</string>
                  </dict>
                </array>
                <key>metadata</key>
                <dict>
                  <key>bundle-identifier</key>
                  <string>com.healthapp.tracker</string>
                  <key>bundle-version</key>
                  <string>${RUN}</string>
                  <key>kind</key>
                  <string>software</string>
                  <key>title</key>
                  <string>Health Tracker</string>
                </dict>
              </dict>
            </array>
          </dict>
          </plist>
          MANIFEST
            INSTALL_URL="itms-services://?action=download-manifest&url=${MANIFEST_URL}"
            export INSTALL_URL
            node -e "
            const fs = require('fs');
            const j = JSON.parse(fs.readFileSync('$IOS_DIR/latest.json', 'utf8'));
            j.installUrl = process.env.INSTALL_URL;
            fs.writeFileSync('$IOS_DIR/latest.json', JSON.stringify(j));
            "
            echo "OTA installUrl added to latest.json"
          fi

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios
          path: "App build/iOS/"

      - name: Commit and push iOS build to repo (for download link)
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "App build/iOS/"
          git diff --staged --quiet || git commit -m "Update iOS build (build ${{ github.run_number }}) [skip ci]"
          git fetch origin ${{ github.ref_name }}
          git rebase origin/${{ github.ref_name }} || git merge --no-edit origin/${{ github.ref_name }}
          git push origin ${{ github.ref_name }}

      - name: Note when App build/iOS is not committed
        if: github.event_name != 'push' || (github.ref != 'refs/heads/main' && github.ref != 'refs/heads/master')
        run: |
          echo "App build/iOS was built and uploaded as the 'ios' artifact. It is only committed to the repo on push to main/master (so the Settings 'Install on iOS' link works after merge). Download from this run's Artifacts if needed."
