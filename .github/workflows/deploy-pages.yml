# Deploy the web app (web/) to GitHub Pages so index.html is at the site root.
# Repo Settings → Pages → Source: Deploy from a branch → Branch: gh-pages, Folder: / (root)
name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: pages
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Prepare site (web + App build for download links)
        run: |
          mkdir -p site
          cp -r web/* site/
          if [ -d "App build" ]; then
            mkdir -p "site/App build"
            cp -r "App build/"* "site/App build/" 2>/dev/null || true
          fi

      - name: Upload artifact (web app + App build as site root)
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
