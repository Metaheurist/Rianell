# Deploy the web app (web/) to GitHub Pages so index.html is at the site root.
# Repo Settings → Pages → Source: Deploy from a branch → Branch: gh-pages, Folder: / (root)
name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: pages
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Setup Node (minify web app for Pages)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Prepare site (web + App build for download links)
        run: |
          mkdir -p site
          cp -r web/* site/
          if [ -d "App build" ]; then
            mkdir -p "site/App build"
            cp -r "App build/"* "site/App build/" 2>/dev/null || true
          fi
          npm install
          npx esbuild site/app.js --minify --legal-comments=none --outfile=site/app.min.js
          node -e "
          const fs = require('fs');
          let h = fs.readFileSync('site/index.html', 'utf8');
          h = h.replace(/app\\.js\\?v=1/g, 'app.min.js?v=1');
          fs.writeFileSync('site/index.html', h);
          "

      - name: Inject Supabase config for GitHub Pages (from secrets)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          node -e "
          const fs = require('fs');
          const path = 'site/supabase-config.js';
          let c = fs.readFileSync(path, 'utf8');
          const url = process.env.SUPABASE_URL || '';
          const key = process.env.SUPABASE_ANON_KEY || '';
          if (url) c = c.replace('https://YOUR_PROJECT_REF.supabase.co', url);
          if (key) c = c.replace('YOUR_SUPABASE_ANON_KEY', key);
          fs.writeFileSync(path, c);
          "

      - name: Upload artifact (web app + App build as site root)
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
